services:
  postgres:
    image: postgres:16-alpine
    container_name: ecm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecm_livraria}
      POSTGRES_USER: ${POSTGRES_USER:-ecm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecm_senha}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecm_user -d ecm_livraria"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - ecm_network

  app:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: ecm_app
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - ecm_network

networks:
  ecm_network:
    driver: bridge

volumes:
  postgres_data:

