services:
  postgres:
    image: postgres:16-alpine
    container_name: ecm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecm_livraria}
      POSTGRES_USER: ${POSTGRES_USER:-ecm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecm_senha}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecm_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      target: development
    container_name: ecm_app
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: sh -c "echo 'Iniciando instalacao de dependencias...' && npm install && echo 'Dependencias instaladas. Iniciando servidor...' && npm run dev"

volumes:
  postgres_data:
  redis_data:

