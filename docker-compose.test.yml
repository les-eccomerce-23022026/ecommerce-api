version: "3.9"

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: ecm_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecm_livraria_test
      POSTGRES_USER: ecm_user_test
      POSTGRES_PASSWORD: ecm_senha_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecm_user_test -d ecm_livraria_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ecm_test_network

networks:
  ecm_test_network:
    driver: bridge
